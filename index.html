<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>

    <body class="bg-dark d-flex justify-content-center align-items-center vh-100">

        <main>
            <div class="card shadow-lg p-4 rounded-4">
                <h2 id="titulo" class="text-primary">Login</h2>

                <form id="form-login">

                    <div id="div-email" class="mb-3">
                        <label for="email">Email:</label>

                        <input type="email" id="email" placeholder="Email" class="form-control" required>
                    </div>

                    <div id="div-senha" class="mb-3">
                        <label for="senha">Senha:</label>

                        <input type="password" id="senha" placeholder="Senha" class="form-control" required>
                    </div>

                    <button id="botao-envio" type="submit" class="btn btn-primary w-100"></button>Entrar</button>

                </form>

                <div id="mensagem"></div>

                <div class="toggle" id="toggle">
                    <p>Não tem conta? Cadastre-se!</p>
                </div>

            </div>
        </main>


    <script src="script.js"></script>
</body>

</html>
